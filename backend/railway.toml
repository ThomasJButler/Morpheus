# ==============================================================================
# MORPHEUS RAG CHATBOT - RAILWAY DEPLOYMENT CONFIGURATION
# ==============================================================================
# Deploy backend to Railway: https://railway.app/
# Documentation: https://docs.railway.app/deploy/config-as-code

[build]
# Build command (Railway will run this before deployment)
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Start command (override Dockerfile CMD if needed)
# startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

# Number of replicas (horizontal scaling)
numReplicas = 1

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Health check configuration
healthcheckPath = "/api/health"
healthcheckTimeout = 30

[env]
# Environment variable configuration
# Note: Actual values should be set in Railway dashboard
# These are just type hints for Railway

# Required API keys
# ANTHROPIC_API_KEY = "sk-ant-..."
# OPENAI_API_KEY = "sk-..."
# PINECONE_API_KEY = "..."

# Pinecone configuration
# PINECONE_INDEX_NAME = "morpheus"
# PINECONE_ENVIRONMENT = "us-east-1"

# Model configuration
# ANTHROPIC_MODEL = "claude-3-haiku-20240307"
# EMBEDDING_MODEL = "text-embedding-3-small"

# RAG configuration
# TOP_K_RESULTS = "10"
# MIN_RELEVANCE_SCORE = "0.7"
# DENSE_WEIGHT = "0.7"
# SPARSE_WEIGHT = "0.3"

# API configuration
# API_HOST = "0.0.0.0"
# API_PORT = "$PORT"  # Railway auto-assigns port
# CORS_ORIGINS = "https://your-frontend.vercel.app"

# Logging
# LOG_LEVEL = "INFO"

# Production settings
# DEBUG = "false"
# RELOAD = "false"

# ==============================================================================
# DEPLOYMENT INSTRUCTIONS
# ==============================================================================
#
# 1. Install Railway CLI:
#    npm install -g @railway/cli
#
# 2. Login to Railway:
#    railway login
#
# 3. Initialize project:
#    railway init
#
# 4. Link to existing project (if applicable):
#    railway link
#
# 5. Set environment variables:
#    railway variables set ANTHROPIC_API_KEY=your_key
#    railway variables set OPENAI_API_KEY=your_key
#    railway variables set PINECONE_API_KEY=your_key
#    # ... set all other required variables
#
# 6. Deploy:
#    railway up
#
# 7. Get deployment URL:
#    railway status
#    railway open
#
# ==============================================================================
# ENVIRONMENT VARIABLES TO SET IN RAILWAY DASHBOARD
# ==============================================================================
#
# Required:
# - ANTHROPIC_API_KEY
# - OPENAI_API_KEY
# - PINECONE_API_KEY
# - PINECONE_INDEX_NAME
# - PINECONE_ENVIRONMENT
# - CORS_ORIGINS (add your Vercel frontend URL)
#
# Optional (with defaults):
# - ANTHROPIC_MODEL (default: claude-3-haiku-20240307)
# - EMBEDDING_MODEL (default: text-embedding-3-small)
# - TOP_K_RESULTS (default: 10)
# - MIN_RELEVANCE_SCORE (default: 0.7)
# - LOG_LEVEL (default: INFO)
#
# ==============================================================================
